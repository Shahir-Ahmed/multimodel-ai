services:
  backend:
    build: ./backend
    container_name: multimodel-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: multimodel-ai-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  # Named volume so the container's own node_modules (installed for Linux)
  # isn't shadowed by the host bind mount above (which won't have
  # node_modules at all if you've never run `npm install` locally).
  frontend_node_modules:
